# Pop genre module config
name: Pop
color: violet
subgenre_count: "20+"

tag_categories:
  - id: genre
    name: Genre
    color: accent
    suggestions:
      - "Synth-Pop"
      - "Dream Pop"
      - "Dance-Pop"
      - "Indie Pop"
      - "Art Pop"
      - "Power Pop"
      - Electropop
      - Bubblegum
  - id: mood
    name: Mood
    color: amber
    suggestions:
      - Catchy
      - Dreamy
      - Upbeat
      - Sweet
      - Melancholic
      - Bright
      - Hazy
      - Emotional
  - id: inst
    name: Instruments
    color: cyan
    suggestions:
      - Synth
      - Guitar
      - Piano
      - Strings
      - "Drum Machine"
      - Bass
      - Vocals
      - Pads
  - id: prod
    name: Production
    color: violet
    suggestions:
      - Polished
      - Reverb
      - Compression
      - Layering
      - "Gated Reverb"
      - "Wide Stereo"
      - "Tape Saturation"
      - Chorus

presets:
  - id: synthpop_chart
    name: "Synth-Pop — Chart"
    description: "Bright, catchy synth-pop with anthemic choruses"
    values:
      subgenre: synthpop
      bpm: 116
      key: A
      scale: major
      mood: "bright and catchy"
      energy: 7
      complexity: 5
      lyricsMode: full_lyrics
      theme: "love"
  - id: dreampop_hazy
    name: "Dream Pop — Hazy"
    description: "Ethereal dream pop with lush textures and hazy vocals"
    values:
      subgenre: dreampop
      bpm: 96
      key: "F#"
      scale: major
      mood: "dreamy and ethereal"
      energy: 5
      complexity: 6
      lyricsMode: full_lyrics
      theme: "dreams"
  - id: dancepop_upbeat
    name: "Dance-Pop — Upbeat"
    description: "Upbeat dance-pop with infectious grooves"
    values:
      subgenre: dancepop
      bpm: 118
      key: "C#"
      scale: minor
      mood: "upbeat and danceable"
      energy: 8
      complexity: 5
      lyricsMode: full_lyrics
      theme: "party"

song_structure:
  - section: intro
    bars: { base: 8, per_complexity: 0.5 }
    tags: [instrumental, pads]
  - section: verse
    bars: { base: 8, per_complexity: 0.5 }
    tags: [stripped, vocals]
  - section: pre_chorus
    bars: 8
    tags: [building, layered]
  - section: chorus
    bars: { base: 16, per_energy: 0.8 }
    tags: [full, hook, energetic]
  - section: bridge
    bars: 8
    tags: [stripped, introspective]
  - section: outro
    bars: { base: 8, per_complexity: 0.5 }
    tags: [fading, reverb]
