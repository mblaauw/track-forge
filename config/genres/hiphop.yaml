# Hip-Hop genre module config
name: Hip-Hop
color: amber
subgenre_count: "40+"

defaults:
  subgenre: boom_bap
  bpm: 88
  key: C
  scale: minor
  mood: ""
  narrativeArc: braggadocio
  rhymeStyle: end_rhyme
  flowPattern: laid_back
  delivery: conversational
  productionStyle: polished
  energy: 6
  complexity: 5
  lyricsMode: full_lyrics
  customTags: ""
  reference: ""

tag_policy:
  mandatoryTags: ["hip hop", rap]
  forbiddenTags: []
  canonicalMap:
    hiphop: "hip hop"
    "hip-hop": "hip hop"
    "rap music": rap
    gangsta: "gangsta rap"
    "trap music": trap
    "old school": "old school hip hop"
    eastcoast: "east coast"
    westcoast: "west coast"

adjustment_vocabulary:
  styleTerms:
    - "add distortion on 808"
    - "reduce hi-hat velocity"
    - "more snare rolls"
    - "add vinyl crackle"
    - "pitch down samples"
    - "layer synth pads"
    - "add reverb to vocals"
    - "emphasize kick pattern"
    - "more sub bass"
    - "add orchestral elements"
    - "filter sweep intro"
    - "double-time hi-hats"
    - "add call-and-response hook"
  structureTerms:
    - "extend verse by 4 bars"
    - "shorten intro"
    - "add bridge section"
    - "increase hook repetition"
    - "add breakdown"
    - "reorder sections"
    - "add ad-lib section"
    - "include spoken word outro"
  deliveryTerms:
    - "more aggressive delivery"
    - "smoother vocal tone"
    - "add ad-libs"
    - "increase vocal presence"
    - "add backing vocals"
    - "double tracked verses"
    - "auto-tune effect"
    - "breathy delivery"
    - "staccato phrasing"
    - "melodic hook style"

tag_categories:
  - id: genre
    name: Genre
    color: accent
    suggestions:
      - "Boom Bap"
      - Trap
      - Lo-fi
      - Drill
      - Grime
      - "Cloud Rap"
      - Crunk
      - G-Funk
  - id: mood
    name: Mood
    color: amber
    suggestions:
      - Hard
      - Chill
      - Dark
      - Hype
      - Nostalgic
      - Soulful
      - Aggressive
      - Introspective
  - id: inst
    name: Instruments
    color: cyan
    suggestions:
      - "808 Bass"
      - Hi-hats
      - Snare
      - Kick
      - "Sample Chop"
      - Strings
      - Keys
      - Brass
  - id: prod
    name: Production
    color: violet
    suggestions:
      - Sidechain
      - "Vinyl Crackle"
      - "Tape Hiss"
      - "Heavy 808"
      - "Double Time"
      - Layering
      - Reverb
      - Delay

