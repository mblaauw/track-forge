  - section: intro
    fn: establish
    bars: 8
    tags:
      - atmospheric
      - sparse texture
  - section: verse
    fn: introduce
    bars: 16
    tags:
      - vocal focus
  - section: hook
    fn: peak
    bars: 8
    tags:
      - full arrangement
      - catchy
  - section: verse
    fn: contrast
    bars: 16
    tags:
      - vocal focus
  - section: hook
    fn: peak
    bars: 8
    tags:
      - full arrangement
      - catchy
      - climactic
  - section: bridge
    fn: contrast
    bars: 8
    tags:
      - strip drums
      - introspective
  - section: hook
    fn: peak
    bars: 8
    tags:
      - full arrangement
      - catchy
  - section: outro
    fn: resolve
    bars: 8
    tags:
      - reduce layers
