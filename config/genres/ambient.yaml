# Ambient genre module config
name: Ambient
color: accent
subgenre_count: "15+"

tag_categories:
  - id: genre
    name: Genre
    color: accent
    suggestions:
      - "Ambient Drone"
      - Generative
      - "Dark Ambient"
      - "Space Music"
      - "Nature Field"
      - Cinematic
      - Minimalism
      - Isolationist
  - id: mood
    name: Mood
    color: amber
    suggestions:
      - Meditative
      - Serene
      - Dark
      - Peaceful
      - Melancholic
      - Ethereal
      - Hypnotic
      - Weightless
  - id: inst
    name: Instruments
    color: cyan
    suggestions:
      - Pads
      - "Field Recording"
      - "Bell Tones"
      - Granular
      - "Tape Loops"
      - Drone
      - Strings
      - Piano
  - id: prod
    name: Production
    color: violet
    suggestions:
      - Reverb
      - Delay
      - "Tape Wear"
      - "Granular Texture"
      - "Slow Modulation"
      - Saturation
      - Panning
      - "Space Echo"

presets:
  - id: drone_minimal
    name: "Drone — Minimal"
    description: "Deep meditative drone with minimal harmonic movement"
    values:
      subgenre: drone
      bpm: 62
      key: C
      scale: major
      mood: "meditative"
      complexity: 3
      lyricsMode: strict_instrumental
      soundscape: "deep drones"
  - id: generative_evolving
    name: "Generative — Evolving"
    description: "Evolving generative textures that shift over time"
    values:
      subgenre: generative
      bpm: 70
      key: E
      scale: minor
      mood: "serene"
      complexity: 6
      lyricsMode: strict_instrumental
      soundscape: "evolving textures"

song_structure:
  - section: emerge
    bars: { base: 12, per_complexity: 1.5 }
    tags: [spacious, texture build, slow entry]
  - section: swell
    bars: { base: 16, per_complexity: 2 }
    tags: [layered, evolving, deepening]
  - section: drift
    bars: { base: 16, per_complexity: 1.5 }
    tags: [floating, wide, textural]
  - section: fade
    bars: { base: 12, per_complexity: 1.5 }
    tags: [dissolving, sparse, receding]

descriptor_categories:
  - cat: sound
    label: TEXTURE
    hue: var(--hue-cyan)
    chips: ["granular pad", "field recording", "glass harmonica", "tape loop", drone, glockenspiel, organ]
  - cat: rhythm
    label: PULSE
    hue: var(--hue-amber)
    chips: ["slow pulse", "no beat", "irregular rhythm", "gentle swell", "lullaby tempo"]
  - cat: atmosphere
    label: SPACE
    hue: var(--hue-violet)
    chips: [ethereal, cinematic, intimate, vast, underwater, meditative, open]
  - cat: production
    label: LUSH
    hue: var(--hue-green)
    chips: ["wide stereo", "analog warmth", "reverb wash", "tape saturation", "soft compression"]
  - cat: energy
    label: ENERGY
    hue: var(--hue-red)
    chips: [still, "slow build", floating, calm, hypnotic, sparse, dense]

descriptor_defaults:
  - { label: "granular pad", cat: sound, weight: 2 }
  - { label: "slow pulse", cat: rhythm, weight: 2 }
  - { label: cinematic, cat: atmosphere, weight: 2 }
  - { label: ethereal, cat: energy, weight: 2 }
  - { label: "wide stereo", cat: production, weight: 2 }

lyric_themes: [stillness, memory, nature, solitude, dreams, distance]

section_functions: [establish, introduce, escalate, contrast, remove, peak, resolve]
delta_palette: ["sparse texture", atmospheric, filtered, "add rhythm", "rising tension", "full groove", "bass-led", "wide theme", "full arrangement", catchy, "strip drums", "expose harmony", "add countermelody", "added impact", climactic, introspective, "half-time feel", "vocal focus", instrumental, "reduce layers"]
section_palette: [Intro, Build, Drop, Breakdown, Bridge, Verse, Chorus, Hook, Outro]
vocal_presets:
  - { type: "Female lead", delivery_style: ethereal, default_energy: 1 }
  - { type: "Male lead", delivery_style: ethereal, default_energy: 1 }
  - { type: Duet, delivery_style: ethereal, default_energy: 1 }
  - { type: "Group·choir", delivery_style: ethereal, default_energy: 2 }
  - { type: "Wordless·textural", delivery_style: ethereal, default_energy: 1 }
