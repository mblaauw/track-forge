# Ambient genre module config
name: Ambient
color: violet
subgenre_count: "2"

tag_categories:
  - id: genre
    name: Genre
    color: accent
    suggestions:
      - "Ambient Drone"
      - Generative
      - "Dark Ambient"
      - "Space Music"
      - "Nature Field"
      - Cinematic
      - Minimalism
      - Isolationist
  - id: mood
    name: Mood
    color: amber
    suggestions:
      - Meditative
      - Serene
      - Dark
      - Peaceful
      - Melancholic
      - Ethereal
      - Hypnotic
      - Weightless
  - id: inst
    name: Instruments
    color: cyan
    suggestions:
      - Pads
      - "Field Recording"
      - "Bell Tones"
      - Granular
      - "Tape Loops"
      - Drone
      - Strings
      - Piano
  - id: prod
    name: Production
    color: violet
    suggestions:
      - Reverb
      - Delay
      - "Tape Wear"
      - "Granular Texture"
      - "Slow Modulation"
      - Saturation
      - Panning
      - "Space Echo"

presets:
  - id: drone_minimal
    name: "Drone — Minimal"
    description: "Deep meditative drone with minimal harmonic movement"
    values:
      subgenre: drone
      bpm: 62
      key: C
      scale: major
      mood: "meditative"
      complexity: 3
      energy: 2
      lyricsMode: strict_instrumental
      soundscape: "deep drones"
  - id: generative_evolving
    name: "Generative — Evolving"
    description: "Evolving generative textures that shift over time"
    values:
      subgenre: generative
      bpm: 70
      key: E
      scale: minor
      mood: "serene"
      complexity: 6
      energy: 3
      lyricsMode: strict_instrumental
      soundscape: "evolving textures"

song_structure:
  - section: emerge
    fn: establish
    bars: { base: 12, per_complexity: 1.5 }
    tags: [atmospheric, "sparse texture"]
  - section: swell
    fn: escalate
    bars: { base: 16, per_complexity: 2 }
    tags: ["rising tension"]
  - section: drift
    fn: peak
    bars: { base: 16, per_complexity: 1.5 }
    tags: ["wide theme", "full arrangement"]
  - section: fade
    fn: resolve
    bars: { base: 12, per_complexity: 1.5 }
    tags: ["reduce layers"]

taxonomy:
  subgenres:
    - id: drone
      label: Drone
      bpmRange: [40, 75]
      bpmDefault: 62
      scale: major
      characteristics:
        [
          meditative,
          minimal,
          sustained,
          "deep drones",
          "slow-evolving",
          spacious,
        ]
      vocalMode: none
      arrangementTags:
        emerge: [spacious, "slow entry"]
        swell: [layered, deepening]
        drift: [floating, textural]
        fade: [dissolving, receding]
      description: "Deep, sustained drone with minimal harmonic movement and a meditative pace."
    - id: generative
      label: Generative
      bpmRange: [50, 90]
      bpmDefault: 70
      scale: minor
      characteristics:
        [evolving, serene, "shifting textures", generative, spacious]
      vocalMode: none
      arrangementTags:
        emerge: [spacious, "texture build"]
        swell: [layered, evolving]
        drift: [floating, wide]
        fade: [dissolving, sparse]
      description: "Evolving generative textures that shift gradually over a serene, spacious backdrop."

descriptor_categories:
  - cat: sound
    label: TEXTURE
    hue: var(--hue-cyan)
    chips:
      [
        "granular pad",
        "field recording",
        "glass harmonica",
        "tape loop",
        drone,
        glockenspiel,
        organ,
      ]
  - cat: rhythm
    label: PULSE
    hue: var(--hue-amber)
    chips:
      [
        "slow pulse",
        "no beat",
        "irregular rhythm",
        "gentle swell",
        "lullaby tempo",
      ]
  - cat: atmosphere
    label: SPACE
    hue: var(--hue-violet)
    chips: [ethereal, cinematic, intimate, vast, underwater, meditative, open]
  - cat: production
    label: LUSH
    hue: var(--hue-green)
    chips:
      [
        "wide stereo",
        "analog warmth",
        "reverb wash",
        "tape saturation",
        "soft compression",
      ]
  - cat: energy
    label: ENERGY
    hue: var(--hue-red)
    chips: [still, "slow build", floating, calm, hypnotic, sparse, dense]

descriptor_defaults:
  - label: "granular pad"
    cat: sound
    weight: 2
  - label: "slow pulse"
    cat: rhythm
    weight: 2
  - label: cinematic
    cat: atmosphere
    weight: 2
  - label: ethereal
    cat: atmosphere
    weight: 2
  - label: "wide stereo"
    cat: production
    weight: 2

lyric_themes: [stillness, memory, nature, solitude, dreams, distance]

section_palette: [Emerge, Swell, Drift, Movement, Interlude, Fade]
vocal_presets:
  - type: female_lead
    delivery_style: ethereal
    default_energy: 1
  - type: male_lead
    delivery_style: ethereal
    default_energy: 1
  - type: duet
    delivery_style: ethereal
    default_energy: 1
  - type: group_choir
    delivery_style: ethereal
    default_energy: 2
  - type: wordless_textural
    delivery_style: ethereal
    default_energy: 1

lyrics_guidance: |
  Ambient vocals are texture, not narration. Favor short, fragmentary
  phrases, single repeated words, or wordless syllables (ah, oh, mmm) over
  full sentences — lines should feel like they emerge from and dissolve back
  into the soundscape rather than tell a story in sequence. Avoid rhyme
  schemes and rhythmic regularity; let phrasing breathe with long pauses
  implied between lines. When a "Wordless·textural" vocal type is set,
  return only non-lexical syllables, no literal words. Keep total line count
  per section low even when many bars are available — ambient arrangements
  favor space over density.
