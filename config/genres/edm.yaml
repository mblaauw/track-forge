song_structure:
  - section: intro
    bars: { base: 8, per_complexity: 0.5 }
    tags: [filtered, atmospheric]
  - section: build
    bars: 8
    tags: [layered, rising, percussion build]
  - section: drop
    bars: { base: 16, per_energy: 1.2 }
    tags: [full, driving]
  - section: breakdown
    bars: { base: 8, per_complexity: 0.8 }
    tags: [stripped, atmospheric]
  - section: build_2
    bars: 8
    tags: [layered, rising, tension]
  - section: drop_2
    bars: { base: 16, per_energy: 1.2 }
    tags: [full, variation]
  - section: bridge
    bars: 8
    tags: [transition]
  - section: outro
    bars: { base: 8, per_complexity: 0.5 }
    tags: [filtered, fading]

taxonomy:
  families:
    [
      house,
      techno,
      trance,
      breakbeat,
      dnb,
      bass,
      hardcore,
      electro,
      downtempo,
      pop,
    ]
  family_labels:
    house: House
    techno: Techno
    trance: Trance
    breakbeat: "Breakbeat / Breaks"
    dnb: "Drum & Bass"
    bass: "Bass Music"
    hardcore: "Hardcore / Hardstyle"
    electro: Electro
    downtempo: "Downtempo / Chill"
    pop: "Pop / Dance"
  subgenres:
    # ── House ──────────────────────
    - id: deep_house
      label: "Deep House"
      family: house
      bpmRange: [110, 125]
      bpmDefault: 120
      scale: minor
      characteristics:
        [warm, soulful, groovy, "jazzy chords", "subby bass", "lush pads"]
      vocalMode: vocals_hook
      arrangementTags:
        intro: [filtered, atmospheric, pads]
        drop: [groovy, funky, minimal]
        breakdown: [soulful, rhodes, strings]
        outro: [filtered, fade]
      description: "Warm, soulful house with jazzy chords and groovy basslines."
    - id: tech_house
      label: "Tech House"
      family: house
      bpmRange: [120, 128]
      bpmDefault: 125
      scale: minor
      characteristics:
        [driving, minimal, loopy, "punchy kick", "acid elements", groove]
      vocalMode: vocals_hook
      arrangementTags:
        intro: [percussive, filtered]
        drop: [driving, loopy, punchy]
        breakdown: [stripped, fx]
        outro: [filtered, percussion]
      description: "Minimal, driving house with loop-based grooves and punchy percussion."
    - id: progressive_house
      label: "Progressive House"
      family: house
      bpmRange: [125, 135]
      bpmDefault: 128
      scale: minor
      characteristics:
        [building, atmospheric, melodic, "long transitions", euphoric]
      vocalMode: vocals_hook
      arrangementTags:
        intro: [building, atmospheric]
        drop: [euphoric, melodic, driving]
        breakdown: [emotional, pads, plucks]
        outro: [fading, atmospheric]
      description: "Building, euphoric house with long transitions and melodic peaks."
    - id: tropical_house
      label: "Tropical House"
      family: house
      bpmRange: [95, 115]
      bpmDefault: 105
      scale: major
      characteristics:
        ["laid-back", sunny, "acoustic elements", "steel drums", warm]
      vocalMode: vocals_full
      arrangementTags:
        intro: [acoustic, sunny, guitar]
        drop: [warm, groovy, melodic]
        breakdown: [chilled, piano]
        outro: [acoustic, fade]
      description: "Laid-back, sunny house with acoustic instruments and warm vibes."
    - id: future_house
      label: "Future House"
      family: house
      bpmRange: [122, 128]
      bpmDefault: 126
      scale: minor
      characteristics:
        [bouncy, "synth-driven", "pitch-bent chords", funky, digital]
      vocalMode: vocals_hook
      arrangementTags:
        intro: [filtered, synth]
        drop: [bouncy, funky, "pitch-bent"]
        breakdown: [melodic, "synth pads"]
        outro: [filtered, fade]
      description: "Bouncy, synth-driven house with pitch-bent chords and funky groove."
    - id: garage_house
      label: "UK Garage / House"
      family: house
      bpmRange: [125, 135]
      bpmDefault: 130
      scale: minor
      characteristics:
        [swinging, "shuffling hats", "subby bass", "chopped vocals", skippy]
      vocalMode: vocals_full
      arrangementTags:
        intro: [shuffling, percussive]
        drop: [swinging, bassy, chopped]
        breakdown: [vocal, stripped]
        outro: [shuffling, fade]
      description: "Swinging garage rhythm with shuffling hi-hats and chopped vocal samples."
    # ── Techno ──────────────────────
    - id: detroit_techno
      label: "Detroit Techno"
      family: techno
      bpmRange: [125, 135]
      bpmDefault: 130
      scale: minor
      characteristics: [futuristic, soulful, analog, minimal, hypnotic, deep]
      vocalMode: none
      arrangementTags:
        intro: [hypnotic, analog]
        drop: [driving, minimal, deep]
        breakdown: [atmospheric, spacey]
        outro: [fading, hypnotic]
      description: "Futuristic, hypnotic techno with soulful analog textures."
    - id: minimal_techno
      label: "Minimal Techno"
      family: techno
      bpmRange: [125, 135]
      bpmDefault: 130
      scale: minor
      characteristics:
        [stripped, repetitive, "micro-sounds", "subtle evolution", functional]
      vocalMode: none
      arrangementTags:
        intro: [stripped, percussive]
        drop: [driving, minimal, hypnotic]
        breakdown: [quiet, textural]
        outro: [stripped, fade]
      description: "Stripped-back, repetitive techno with subtle micro-sound evolution."
    - id: industrial_techno
      label: "Industrial Techno"
      family: techno
      bpmRange: [130, 150]
      bpmDefault: 140
      scale: minor
      characteristics:
        [aggressive, distorted, harsh, mechanical, dark, relentless]
      vocalMode: none
      arrangementTags:
        intro: [building, noise]
        drop: [aggressive, distorted, driving]
        breakdown: [dark, atmospheric]
        outro: [decaying, noise]
      description: "Aggressive, distorted techno with mechanical and dark textures."
    - id: melodic_techno
      label: "Melodic Techno"
      family: techno
      bpmRange: [120, 130]
      bpmDefault: 125
      scale: minor
      characteristics:
        [emotional, atmospheric, "melodic leads", "rich pads", driving]
      vocalMode: vocals_hook
      arrangementTags:
        intro: [atmospheric, building]
        drop: [melodic, driving, emotional]
        breakdown: [atmospheric, pads, strings]
        outro: [fading, atmospheric]
      description: "Emotional, atmospheric techno with melodic leads and rich pads."
    - id: hard_techno
      label: "Hard Techno"
      family: techno
      bpmRange: [145, 160]
      bpmDefault: 150
      scale: minor
      characteristics:
        [hard, fast, "distorted kick", industrial, intense, relentless]
      vocalMode: none
      arrangementTags:
        intro: [building, percussive]
        drop: [intense, hard, fast]
        breakdown: [dark, minimal]
        outro: [relentless, fade]
      description: "Hard, fast techno with distorted kicks and relentless energy."
    - id: dub_techno
      label: "Dub Techno"
      family: techno
      bpmRange: [115, 125]
      bpmDefault: 120
      scale: minor
      characteristics: [dubby, "reverb-drenched", echo, spacey, minimal, deep]
      vocalMode: none
      arrangementTags:
        intro: [spacey, echo]
        drop: [dubby, deep, minimal]
        breakdown: [reverb, atmospheric]
        outro: [echo, fading]
      description: "Dub-influenced techno with heavy reverb, echo, and space."
    # ── Trance ──────────────────────
    - id: uplifting_trance
      label: "Uplifting Trance"
      family: trance
      bpmRange: [135, 145]
