  - cat: sound
    label: SOUND DESIGN
    hue: var(--hue-cyan)
    chips:
      - supersaw
      - "reese bass"
      - "pluck lead"
      - "fm bells"
      - "granular pad"
      - "detuned saw"
      - "sine sub"
      - "vocal chops"
      - "arp sequence"
      - "saw stabs"
  - cat: rhythm
    label: RHYTHM
    hue: var(--hue-amber)
    chips:
      - "four-on-the-floor"
      - "syncopated hats"
      - "offbeat bass"
      - "rolling toms"
      - breakbeat
      - "driving kick"
      - "shuffled groove"
  - cat: atmosphere
    label: ATMOSPHERE
