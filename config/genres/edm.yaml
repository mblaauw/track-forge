song_structure:
  - section: intro
    fn: establish
    bars: { base: 8, per_complexity: 0.5 }
    tags: [atmospheric, "sparse texture"]
  - section: build
    fn: introduce
    bars: 8
    tags: ["add rhythm", "rising tension"]
  - section: drop
    fn: peak
    bars: { base: 16, per_energy: 1.2 }
    tags: ["full groove", "bass-led", "wide theme"]
  - section: breakdown
    fn: remove
    bars: { base: 8, per_complexity: 0.8 }
    tags: ["strip drums", "expose harmony"]
  - section: build_2
    fn: escalate
    bars: 8
    tags: ["rising tension"]
  - section: drop_2
    fn: peak
    bars: { base: 16, per_energy: 1.2 }
    tags: ["added impact", "add countermelody"]
  - section: bridge
    fn: contrast
    bars: 8
    tags: [introspective]
  - section: outro
    fn: resolve
    bars: { base: 8, per_complexity: 0.5 }
    tags: ["reduce layers"]

