descriptor_categories:
  - cat: sound
    label: SOUND DESIGN
    hue: var(--hue-cyan)
    chips:
      [
        supersaw,
        "reese bass",
        "pluck lead",
        "fm bells",
        "granular pad",
        "detuned saw",
        "sine sub",
        "vocal chops",
        "arp sequence",
        "saw stabs",
      ]
  - cat: rhythm
    label: RHYTHM
    hue: var(--hue-amber)
    chips:
      [
        "four-on-the-floor",
        "syncopated hats",
        "offbeat bass",
        "rolling toms",
        breakbeat,
        "driving kick",
        "shuffled groove",
      ]
  - cat: atmosphere
    label: ATMOSPHERE
    hue: var(--hue-violet)
    chips:
      [euphoric, dark, dreamy, hypnotic, cinematic, nostalgic, uplifting, tense]
  - cat: production
    label: PRODUCTION
    hue: var(--hue-green)
    chips:
      [
        "sidechain pump",
        "wide stereo",
        "analog warmth",
        "crisp transients",
        "tape saturation",
        "polished master",
        "heavy compression",
      ]
  - cat: energy
    label: ENERGY
    hue: var(--hue-red)
    chips:
      [
        "high energy",
        driving,
        "restrained build",
        "explosive drop",
        relentless,
        "dynamic swells",
      ]

