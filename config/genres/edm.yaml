# EDM genre module config
name: EDM
color: cyan
subgenre_count: "80+"

defaults:
  family: house
  subgenre: deep_house
  bpm: 120
  key: auto
  scale: minor
  mood: energetic
  energy: 7
  complexity: 5
  lyricsMode: guided_instrumental
  customTags: []

tag_policy:
  mandatoryTags: [electronic]
  forbiddenTags: [acoustic, "live band", orchestral]
  canonicalMap:
    edm: electronic
    dance: electronic
    club: electronic
    "four to the floor": "four-on-the-floor"
    "4x4": "four-on-the-floor"

adjustment_vocabulary:
  styleTerms:
    - driving
    - melodic
    - dark
    - warm
    - atmospheric
    - aggressive
    - euphoric
    - minimal
    - groovy
    - hypnotic
    - rolling
    - bouncy
    - deep
    - hard
    - soulful
    - techy
    - psychedelic
    - emotional
    - layered
    - filtered
  structureTerms:
    - "long intro"
    - "extended build"
    - "early drop"
    - "minimal breakdown"
    - "extended outro"
    - "double drop"
    - "climactic bridge"
    - "reverse drop"
  deliveryTerms:
    - "tight percussion"
    - "loose groove"
    - syncopated
    - "four-on-the-floor"
    - "half-time feel"
    - "shuffling hats"
    - "rolling bass"

tag_categories:
  - id: genre
    name: Genre
    color: accent
    suggestions:
      - "Progressive House"
      - "Deep House"
      - Techno
      - Trance
      - "Drum & Bass"
      - "Future Bass"
      - Dubstep
      - Garage
  - id: mood
    name: Mood
    color: amber
    suggestions:
      - Euphoric
      - Dark
      - Dreamy
      - Aggressive
      - Uplifting
      - Hypnotic
      - Melancholic
      - Energetic
  - id: inst
    name: Instruments
    color: cyan
    suggestions:
      - "Supersaw Lead"
      - "808 Bass"
      - Piano
      - "Arp Sequence"
      - "Vocal Chops"
      - "Pluck Chords"
      - Pads
      - Strings
  - id: prod
    name: Production
    color: violet
    suggestions:
      - "Sidechain Pump"
      - "Analog Warmth"
      - "Wide Stereo"
      - "Tape Saturation"
      - "Reverb Wash"
      - "Heavy Compression"
      - "Filter Sweeps"
      - Layering

