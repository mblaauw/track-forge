song_structure:
  - section: intro
    fn: establish
    bars:
      base: 8
      per_complexity: 0.5
    tags:
      - atmospheric
      - sparse texture
  - section: build
    fn: introduce
    bars: 8
    tags:
      - add rhythm
      - rising tension
  - section: drop
    fn: peak
    bars:
      base: 16
      per_energy: 1.2
    tags:
      - full groove
      - bass-led
      - wide theme
  - section: breakdown
    fn: remove
    bars:
      base: 8
      per_complexity: 0.8
    tags:
      - strip drums
      - expose harmony
  - section: build_2
    fn: escalate
    bars: 8
    tags:
      - rising tension
  - section: drop_2
    fn: peak
    bars:
      base: 16
      per_energy: 1.2
    tags:
      - added impact
      - add countermelody
  - section: bridge
    fn: contrast
    bars: 8
    tags:
      - introspective
  - section: outro
    fn: resolve
    bars:
      base: 8
      per_complexity: 0.5
    tags:
      - reduce layers
descriptor_categories:
  - cat: sound
    label: SOUND DESIGN
    hue: var(--hue-cyan)
    chips:
      - supersaw
      - reese bass
      - pluck lead
      - fm bells
      - granular pad
      - detuned saw
      - sine sub
      - vocal chops
      - arp sequence
      - saw stabs
  - cat: rhythm
    label: RHYTHM
    hue: var(--hue-amber)
    chips:
      - four-on-the-floor
      - syncopated hats
      - offbeat bass
      - rolling toms
      - breakbeat
      - driving kick
      - shuffled groove
  - cat: atmosphere
    label: ATMOSPHERE
    hue: var(--hue-violet)
    chips:
